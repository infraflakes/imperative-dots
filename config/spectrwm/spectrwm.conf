# --- Clean Bar Settings (Tokyo Night, JetBrains Mono) ---
bar_enabled             = 1
bar_border[1]           = rgb:24/28/3b
bar_color[1]            = rgb:1a/1b/26
bar_font_color[1]       = rgb:c0/ca/f5
bar_font                = JetBrains Mono:pixelsize=16:antialias=true
bar_action              = ~/.config/spectrwm/baraction
bar_format              = +75<WS: +I +5<%a %b %d %R:%S +5<+A

quirk[.*] = IGNORESPAWNWS + IGNOREPID

workspace_limit = 8
focus_mode      = default

region_padding  = 0
tile_gap        = 0

border_width            = 3
color_focus             = rgb:86/af/ef
color_focus_maximized   = rgb:86/af/ef
color_unfocus           = rgb:1e/1b/25

modkey = Mod4

# --- Hardware Media Controls ---
program[vol_up]     = pactl set-sink-volume @DEFAULT_SINK@ +2%
bind[vol_up]        = XF86AudioRaiseVolume

program[vol_down]   = pactl set-sink-volume @DEFAULT_SINK@ -2%
bind[vol_down]      = XF86AudioLowerVolume

program[vol_mute]   = pactl set-sink-mute @DEFAULT_SINK@ toggle
bind[vol_mute]      = XF86AudioMute

program[bright_up]  = light -A 5
bind[bright_up]     = XF86MonBrightnessUp

program[bright_down] = light -U 5
bind[bright_down]   = XF86MonBrightnessDown

# --- Core Operational Applications ---
bind[wind_del]          = MOD+q
bind[focus_next]        = Mod1+Tab
bind[fullscreen_toggle]      = MOD+Shift+f
program[term]       = kitty --single-instance
bind[term]          = MOD+Return
program[lock]       = slock
bind[lock]          = MOD+l
program[term]       = kitty --single-instance
bind[term]          = MOD+Return
program[menu]       = dmenu_run
bind[menu]          = MOD+space

program[screenshot]       = flameshot gui
bind[screenshot]          = MOD+Shift+s

# --- Workspace Navigation (Groups 1-8) ---
bind[swap_main] = MOD + f

bind[focus_next] = MOD+Down
bind[focus_prev] = MOD+Up
bind[ws_next_all] = MOD+Right
bind[ws_prev_all] = MOD+Left

bind[master_shrink] = MOD + Shift + Left
bind[master_grow]   = MOD + Shift + Right

bind[float_toggle] = MOD + w

bind[ws_1]              = MOD+1
bind[ws_2]              = MOD+2
bind[ws_3]              = MOD+3
bind[ws_4]              = MOD+4
bind[ws_5]              = MOD+5
bind[ws_6]              = MOD+6
bind[ws_7]              = MOD+7
bind[ws_8]              = MOD+8

bind[mvws_1]            = MOD+Shift+1
bind[mvws_2]            = MOD+Shift+2
bind[mvws_3]            = MOD+Shift+3
bind[mvws_4]            = MOD+Shift+4
bind[mvws_5]            = MOD+Shift+5
bind[mvws_6]            = MOD+Shift+6
bind[mvws_7]            = MOD+Shift+7
bind[mvws_8]            = MOD+Shift+8

# --- System Lifecycle Management ---
bind[restart]       = MOD+Shift+r
bind[quit]          = MOD+BackSpace
